services:
  # ==================== MySQL 数据库 ====================
  mysql:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: tushen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: tushen_root_2026
      MYSQL_DATABASE: tushen
      MYSQL_USER: tushen
      MYSQL_PASSWORD: tushen_pass_2026
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - tushen-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tushen", "-ptushen_pass_2026"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== 后端服务 ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tushen-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=mysql+pymysql://tushen:tushen_pass_2026@mysql:3306/tushen?charset=utf8mb4
      - UPLOAD_DIR=/app/uploads
    networks:
      - tushen-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/demands"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== 前端（Nginx 服务静态文件） ====================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tushen-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - tushen-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: tushen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/uploads:/uploads:ro
    networks:
      - tushen-network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  tushen-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
